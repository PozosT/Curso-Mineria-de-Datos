# Jupyter Book configuration
title: Minería de Datos – Ciclo 3
author: Alejandra Tabares
logo: ""

# Build settings
only_build_toc_files: true

# HTML-specific settings
html:
  use_issues_button: false
  use_repository_button: true
  use_edit_page_button: false

# Launch button settings
launch_buttons:
  colab_url: "https://colab.research.google.com"

# Repository info
repository:
  url: https://github.com/a.tabaresp/Curso-Mineria-de-Datos
  branch: main

# Execution settings
execute:
  execute_notebooks: "off"

# Parse settings
parse:
  myst_enable_extensions:
    - colon_fence
    - dollarmath
    - html_image
